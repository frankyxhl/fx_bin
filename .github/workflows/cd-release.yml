name: CD Release

on:
  push:
    branches: [main]
    tags: ['v*']

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # Prevent recursion - CRITICAL for avoiding infinite loops
    if: |
      github.ref == 'refs/heads/main' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Semantic Release (Version + Tag + Changelog + GitHub Release)
        id: semantic-release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.SEMANTIC_RELEASE_PAT }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release status summary
        if: always()
        run: |
          if [[ "${{ steps.semantic-release.outputs.version }}" == "" ]]; then
            echo "## ℹ️ No Release" >> $GITHUB_STEP_SUMMARY
            echo "No new version to release (no conventional commits since last release)" >> $GITHUB_STEP_SUMMARY
          else
            VERSION="${{ steps.semantic-release.outputs.version }}"
            echo "📦 New version: $VERSION"
            echo "## 🎉 New Version Released" >> $GITHUB_STEP_SUMMARY
            echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
            echo "**Next step:** tag workflow \`v$VERSION\` will build and publish to PyPI." >> $GITHUB_STEP_SUMMARY
          fi

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fx-bin
    permissions:
      contents: write
      id-token: write  # For trusted publishing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing version: $VERSION"
          echo "## 🚀 Publishing Release" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY

      - name: Check if version exists on PyPI
        id: pypi_check
        run: |
          VERSION="${{ steps.version.outputs.current_version }}"
          echo "Checking if version $VERSION exists on PyPI..."

          # Check PyPI API for existing version
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/fx-bin/$VERSION/json")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "version_exists=true" >> $GITHUB_OUTPUT
            echo "❌ Version $VERSION already exists on PyPI - skipping deployment"
            echo "## ⏭️ Deployment Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Version **$VERSION** already exists on PyPI" >> $GITHUB_STEP_SUMMARY
          else
            echo "version_exists=false" >> $GITHUB_OUTPUT
            echo "✅ Version $VERSION does not exist on PyPI - OK to deploy"
            echo "**Status:** Ready to deploy 🚀" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install Poetry
        if: steps.pypi_check.outputs.version_exists == 'false'
        run: pipx install poetry

      - name: Install dependencies and build
        if: steps.pypi_check.outputs.version_exists == 'false'
        run: |
          echo "📦 Building package version ${{ steps.version.outputs.current_version }}..."
          # Clean dist directory to avoid permission issues
          rm -rf dist/
          poetry install
          poetry build

      - name: Upload build artifacts to GitHub Release
        if: steps.pypi_check.outputs.version_exists == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.current_version }}"
          echo "📎 Uploading build artifacts to GitHub Release v$VERSION..."

          # Wait for release to be available (with retry)
          echo "Waiting for release to be available..."
          for i in {1..10}; do
            if gh release view "v$VERSION" &>/dev/null; then
              echo "✅ Release v$VERSION is available"
              break
            fi
            echo "⏳ Waiting for release (attempt $i/10)..."
            sleep 3
            if [ $i -eq 10 ]; then
              echo "❌ Release not found after 30 seconds"
              exit 1
            fi
          done

          # Upload all dist files with error handling
          UPLOAD_SUCCESS=true
          for file in dist/*; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "📦 Uploading $FILENAME..."

              if gh release upload "v$VERSION" "$file" --clobber; then
                echo "  ✅ Successfully uploaded $FILENAME"
              else
                echo "  ❌ Failed to upload $FILENAME"
                UPLOAD_SUCCESS=false
              fi
            fi
          done

          if [ "$UPLOAD_SUCCESS" = false ]; then
            echo "❌ Some artifacts failed to upload"
            exit 1
          fi

          echo "✅ All build artifacts uploaded to https://github.com/frankyxhl/fx_bin/releases/tag/v$VERSION"

      - name: Deploy to PyPI
        if: steps.pypi_check.outputs.version_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Deployment success
        if: steps.pypi_check.outputs.version_exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.current_version }}"
          echo "🚀 Successfully deployed fx-bin version $VERSION!"
          echo ""
          echo "📦 PyPI: https://pypi.org/project/fx-bin/$VERSION/"
          echo "📦 GitHub Release: https://github.com/frankyxhl/fx_bin/releases/tag/v$VERSION"
          echo "📦 Installation: pip install fx-bin==$VERSION"

          # Add to job summary
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ✅ Deployment Successful

          **Version:** $VERSION

          ### 📦 Package Links
          - **PyPI:** https://pypi.org/project/fx-bin/$VERSION/
          - **GitHub Release:** https://github.com/frankyxhl/fx_bin/releases/tag/v$VERSION

          ### 📥 Installation
          \`\`\`bash
          pip install fx-bin==$VERSION
          \`\`\`
          EOF
